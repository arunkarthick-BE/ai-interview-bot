<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Interview Coach</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background: linear-gradient(135deg,#2563eb,#7c3aed);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Segoe UI',sans-serif;
}

.login-card{
    background:white;
    padding:40px;
    border-radius:20px;
    width:100%;
    max-width:500px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.logo{
    font-size:60px;
}

h1{
    font-weight:700;
    color:#1e293b;
}

.subtitle{
    color:#64748b;
    margin-bottom:25px;
}

.form-control{
    border-radius:10px;
    padding:12px;
}

.btn-start{
    width:100%;
    background:#2563eb;
    border:none;
    padding:12px;
    border-radius:10px;
    color:white;
    font-weight:600;
    transition:0.3s;
}

.btn-start:hover{
    background:#1d4ed8;
}

.upload-box{
    border:2px dashed #cbd5e1;
    padding:20px;
    border-radius:12px;
    text-align:center;
    margin-bottom:20px;
}
</style>

</head>
<body>

<div class="login-card">

    <div class="text-center">
        <div class="logo">🤖</div>

        <h1>AI Interview Coach</h1>

        <p class="subtitle">
            Upload your resume and practice AI-powered interviews
        </p>
    </div>

    <form action="/interview" method="POST" enctype="multipart/form-data">

        <div class="mb-3">
            <label class="form-label">Your Name</label>
            <input type="text"
                   class="form-control"
                   name="username"
                   placeholder="Enter your name"
                   required>
        </div>

        <div class="upload-box">
            <label class="form-label fw-bold">
                Upload Resume (PDF)
            </label>

            <input type="file"
                   class="form-control"
                   name="resume"
                   accept=".pdf"
                   required>
        </div>

        <button type="submit" class="btn-start">
            🚀 Start Interview
        </button>

    </form>

</div>

</body>
</html>
