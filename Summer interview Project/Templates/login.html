```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Mock Interview Coach</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background: linear-gradient(135deg,#2563eb,#7c3aed);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Segoe UI',sans-serif;
    padding:20px;
}

.login-card{
    background:white;
    width:100%;
    max-width:550px;
    padding:45px;
    border-radius:25px;
    box-shadow:0 15px 40px rgba(0,0,0,0.2);
    animation:fadeIn 0.6s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.logo{
    font-size:70px;
}

.title{
    font-size:32px;
    font-weight:700;
    color:#1e293b;
}

.subtitle{
    color:#64748b;
    margin-top:10px;
    margin-bottom:30px;
    line-height:1.6;
}

.form-control{
    padding:13px;
    border-radius:12px;
}

.form-control:focus{
    border-color:#2563eb;
    box-shadow:0 0 0 0.15rem rgba(37,99,235,.25);
}

.upload-box{
    border:2px dashed #cbd5e1;
    border-radius:15px;
    padding:25px;
    text-align:center;
    margin-bottom:25px;
    background:#f8fafc;
}

.upload-icon{
    font-size:40px;
    margin-bottom:10px;
}

.btn-start{
    width:100%;
    border:none;
    border-radius:12px;
    padding:14px;
    background:#2563eb;
    color:white;
    font-size:16px;
    font-weight:600;
    transition:all .3s ease;
}

.btn-start:hover{
    background:#1d4ed8;
    transform:translateY(-2px);
}

.feature-box{
    display:flex;
    justify-content:space-between;
    margin-top:25px;
    text-align:center;
}

.feature{
    flex:1;
}

.feature h6{
    font-size:14px;
    margin-top:8px;
    color:#334155;
}

.footer{
    text-align:center;
    margin-top:25px;
    color:#94a3b8;
    font-size:14px;
}

</style>
</head>

<body>

<div class="login-card">

    <div class="text-center">

        <div class="logo">
            🤖
        </div>

        <h1 class="title">
            AI Mock Interview Coach
        </h1>

        <p class="subtitle">
            Upload your resume, answer AI-generated interview questions,
            and receive an instant professional evaluation report.
        </p>

    </div>

    <form action="/interview" method="POST" enctype="multipart/form-data">

        <div class="mb-3">

            <label class="form-label fw-semibold">
                Your Name
            </label>

            <input
                type="text"
                name="username"
                class="form-control"
                placeholder="Enter your full name"
                required>

        </div>

        <div class="upload-box">

            <div class="upload-icon">
                📄
            </div>

            <label class="form-label fw-bold">
                Upload Resume (PDF Only)
            </label>

            <input
                type="file"
                class="form-control"
                name="resume"
                accept=".pdf"
                required>

        </div>

        <button type="submit" class="btn-start">
            🚀 Start Interview
        </button>

    </form>

    <div class="feature-box">

        <div class="feature">
            🎯
            <h6>Resume Based</h6>
        </div>

        <div class="feature">
            🎙️
            <h6>Voice Answers</h6>
        </div>

        <div class="feature">
            📊
            <h6>AI Evaluation</h6>
        </div>

    </div>

    <div class="footer">
        Powered by Gemini AI
    </div>

</div>

</body>
</html>
```
