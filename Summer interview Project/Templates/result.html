<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Result & AI Evaluation</title>
    <link href="[https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/bootstrap.min.css](https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/bootstrap.min.css)" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .result-card { background: #ffffff; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); padding: 40px; margin-top: 50px; }
        .btn-restart { background-color: #2563eb; color: white; border-radius: 8px; font-weight: 600; padding: 10px 25px; text-decoration: none; transition: 0.3s; }
        .btn-restart:hover { background-color: #1d4ed8; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-10">
            <div class="result-card">
                <h2 class="text-center mb-4" style="color: #1e293b;">Interview Report Card</h2>
                <hr>
                
                <div class="ai-report my-4 fs-5 leading-relaxed">
                    {{ evaluation|safe }}
                </div>
                
                <hr>
                <div class="text-center mt-4">
                    <a href="/" class="btn-restart">Take Another Interview</a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
